name: Chromatic

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  chromatic-pr:
    if: >
      github.event_name == 'pull_request_target' &&
      (
        github.event.pull_request.head.repo.fork == false ||
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR","CONTRIBUTOR"]'), github.event.pull_request.author_association) ||
        contains(github.event.pull_request.labels.*.name, 'safe-to-test')
      )
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      CHROMATIC_BRANCH: ${{ github.event.pull_request.head.ref }}
      CHROMATIC_SHA: ${{ github.event.pull_request.head.sha }}
      CHROMATIC_SLUG: ${{ github.event.pull_request.head.repo.full_name }}
      PUBLIC_SITE_ENV: ci
    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        uses: chromaui/action@v16
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitOnceUploaded: true
          autoAcceptChanges: main

  chromatic-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
      PUBLIC_SITE_ENV: ci
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        if: env.CHROMATIC_PROJECT_TOKEN != ''
        uses: chromaui/action@v16
        with:
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          onlyChanged: true
          exitOnceUploaded: true
          autoAcceptChanges: main
