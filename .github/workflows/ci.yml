name: CI Pipeline

on:
  push:
    branches: [main, 'chore/scaffold-initial-project']
  pull_request:
    branches: [main]

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npm run build
      - run: npm run check
      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: workspace
          path: |
            .
            !node_modules/.cache
            !.git
          retention-days: 1
  lint:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm run lint
  unit-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm run test:unit
  e2e-tests:
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: workspace
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm run test:e2e
